name: Bug report
description: Report a reproducible problem in Volt Client
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include API keys, tokens, passwords, cookies, private URLs, request bodies, or other sensitive information.
  - type: input
    id: extension-version
    attributes:
      label: Volt Client version
      placeholder: 0.0.3
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: Visual Studio Code version
      placeholder: 1.92.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Windows 11, Ubuntu 24.04
    validations:
      required: true
  - type: dropdown
    id: storage-mode
    attributes:
      label: Storage mode
      options:
        - Global State
        - File
        - Not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use sanitized example data only.
      placeholder: |
        1. Open...
        2. Select...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional sanitized context
      description: Redact all credentials, private endpoints, request data, and customer information.
