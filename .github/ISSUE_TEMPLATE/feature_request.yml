name: Feature request
description: Suggest an improvement to Volt Client
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to accomplish, and what makes it difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe what you would like Volt Client to do.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any current workaround or alternative tool you use.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Do not include credentials, private endpoints, request data, or customer information.
